name: Intraday Prices

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers (e.g. AAPL,MSFT,NVDA)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: intraday-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch quotes
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TICKERS: ${{ inputs.tickers }}
        run: python scripts/fetch_intraday.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/intraday.json data/history
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "intraday: ${{ inputs.tickers }} [skip ci]"
            git pull --rebase
            git push
          fi
