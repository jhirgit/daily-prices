name: Intraday Prices

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: "Comma-separated tickers (e.g. AAPL,MSFT,NVDA); empty = watchlist"
        required: false
        type: string
  schedule:
    # every 20 min during US market hours (13:30-20:00 UTC, EDT); fetches the
    # watchlist (Finnhub-compatible symbols only) so intraday.json stays fresh
    # without anyone needing GitHub auth
    # off-peak minute marks: GitHub skips/delays busy slots like :00/:20/:40.
    # Ends at 19:43 UTC (3:43pm EDT) so the last snapshot freezes ~15 min
    # before the close - a stable pre-close mark until the EOD job publishes.
    - cron: "3,23,43 13-19 * * 1-5"

permissions:
  contents: write

concurrency:
  group: intraday-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch quotes
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TICKERS: ${{ inputs.tickers }}
        run: python scripts/fetch_intraday.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/intraday.json data/history
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "intraday: ${{ inputs.tickers || 'watchlist' }} [skip ci]"
            git pull --rebase
            git push
          fi
